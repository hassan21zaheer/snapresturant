<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Online Ordering</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Global Preloader -->
    <div id="global-loader" class="global-loader">
        <div class="loader-dots">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <!-- Notification Banner -->
    <div id="notification-banner" class="notification-banner hidden">
        <div class="container banner-content">
            <span id="banner-message"></span>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="container header-inner">
            <div class="header-left">
                <a href="/" id="logo-link">
                    <img src="" id="logo-img" alt="Restaurant Logo" class="logo">
                </a>
            </div>
            <div class="header-center">
                <!-- Removed Deliver To section as per user request -->
            </div>
            <div class="header-right">
                <button id="cart-toggle" class="cart-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-badge" class="cart-badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <main id="app-root">
        <!-- Views will be rendered here (Home or Checkout) -->
        <div id="home-view">
            <!-- Hero Slider -->
            <section class="hero">
                <div class="slider-container" id="hero-slider">
                    <!-- Slides will be injected here -->
                </div>
                <button class="slider-btn prev"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="slider-btn next"><i class="fa-solid fa-chevron-right"></i></button>
            </section>

            <!-- Category Tabs -->
            <nav class="category-nav">
                <div class="container">
                    <div class="tabs-container">
                        <button id="scroll-left" class="nav-arrow left hidden"><i
                                class="fa-solid fa-chevron-left"></i></button>
                        <div class="tabs-wrapper" id="category-tabs">
                            <!-- Tabs will be injected here -->
                        </div>
                        <button id="scroll-right" class="nav-arrow right"><i
                                class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
            </nav>

            <!-- Menu Content -->
            <div class="container menu-content">
                <!-- Search -->
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="menu-search" placeholder="Search for items...">
                </div>

                <!-- Sections (Deals, Categories) -->
                <div id="menu-sections">
                    <!-- Section grids will be injected here -->
                </div>
            </div>
        </div>

        <div id="checkout-view" class="hidden">
            <div class="container checkout-container">
                <div class="back-link">
                    <a href="#" id="back-to-menu"><i class="fa-solid fa-arrow-left"></i> Back to Menu</a>
                </div>
                <div class="checkout-grid">
                    <div class="checkout-form-section">
                        <h2>Checkout Information</h2>
                        <form id="checkout-form">
                            <div class="form-group">
                                <label for="full_name">Full Name *</label>
                                <input type="text" id="full_name" name="full_name" required>
                            </div>
                            <div class="form-group">
                                <label for="mobile_number">Mobile Number *</label>
                                <input type="tel" id="mobile_number" name="mobile_number" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email">
                            </div>
                            <div class="form-group">
                                <label for="address">Delivery Address *</label>
                                <textarea id="address" name="address" required></textarea>
                            </div>
                            <div class="form-group">
                                <label for="order_instructions">Order Instructions (optional)</label>
                                <textarea id="order_instructions" name="order_instructions"></textarea>
                            </div>
                            <button type="submit" id="place-order-btn" class="primary-btn wide-btn">Place Order</button>
                        </form>
                    </div>
                    <div class="checkout-summary-section">
                        <h2>Order Summary</h2>
                        <div id="checkout-cart-items" class="checkout-cart-items">
                            <!-- Items summarized here -->
                        </div>
                        <div class="coupon-section">
                            <label for="coupon-code">Coupon Code</label>
                            <div class="coupon-input-group">
                                <input type="text" id="coupon-code" placeholder="Enter code">
                                <button type="button" id="apply-coupon-btn">Apply</button>
                            </div>
                            <div id="coupon-message" class="coupon-message"></div>
                        </div>
                        <div id="checkout-totals" class="cart-totals">
                            <!-- Totals summarized here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-flex">
                <!-- Left Group: Logo + Info -->
                <div class="footer-left-group">
                    <div class="footer-logo-col">
                        <img id="footer-logo" src="assets/images/logo.png" alt="Logo">
                    </div>

                    <div class="footer-info-col">
                        <h3 id="footer-name" class="footer-brand-name">SNAP</h3>
                        <p><strong>Phone:</strong> <span id="footer-phone"></span></p>
                        <p><strong>Address:</strong> <span id="footer-address"></span></p>
                    </div>
                </div>

                <!-- Right Group: Timings -->
                <div class="footer-timings-col">
                    <h3>Our Timings</h3>
                    <div class="timing-row">
                        <span id="footer-days">Monday - Sunday</span>
                        <span id="footer-hours">12:00 PM - 03:00 AM</span>
                    </div>
                    <div class="footer-links">
                        <a href="/terms.html">Terms and conditions</a>
                        <a href="/privacy.html">Privacy Policy</a>
                        <!-- <a href="#">Sitemap</a> -->
                    </div>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <div class="container">
                <p>&copy; 2026 Powered by <img src="assets/images/teqaura256.png" alt="Teqaura"
                        class="footer-logo-small"> <a href="https://www.teqaura.com" target="_blank"
                        class="footer-link">Teqaura</a>
                </p>
            </div>
        </div>
    </footer>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="sidebar-header">
            <h3>Your Cart</h3>
            <button id="close-sidebar" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="cart-items" class="cart-items">
            <!-- Cart items injected here -->
        </div>
        <div class="sidebar-footer">
            <div id="cart-summary" class="cart-totals">
                <!-- Subtotal, Tax, Delivery calculations here -->
            </div>
            <button id="checkout-btn" class="primary-btn wide-btn">Checkout</button>
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Modals -->
    <div id="item-modal" class="modal">
        <div class="modal-content item-modal-content">
            <button class="modal-close"><i class="fa-solid fa-xmark"></i></button>
            <div id="item-modal-body">
                <!-- Modal content injected here -->
            </div>
        </div>
    </div>
    <div id="modal-overlay" class="modal-overlay"></div>

    <!-- Scripts -->
    <script type="module" src="js/script.js"></script>
</body>

</html>
